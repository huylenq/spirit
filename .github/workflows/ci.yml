name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  tmux-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build binary
        run: make build

      - name: Test tmux plugin loads
        run: |
          set -euo pipefail
          tmux kill-server >/dev/null 2>&1 || true
          tmux -f /dev/null new-session -d -s test 'sleep 5'
          bash spirit.tmux
          tmux list-keys | grep -q 'C-Space'
          tmux list-keys | grep -q 'C-Tab'
          tmux kill-server
