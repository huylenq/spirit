version: 2

builds:
  - id: cmc
    main: ./cmd/cmc
    binary: cmc
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats: ['tar.gz']
    files:
      - hooks/*
      - cmc.tmux
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
